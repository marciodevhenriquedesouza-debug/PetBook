<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protótipo de Post | PetBook</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          radial-gradient(circle at 12% 8%, rgba(255, 104, 79, 0.12), transparent 26%),
          radial-gradient(circle at 88% 0%, rgba(32, 141, 134, 0.16), transparent 28%),
          linear-gradient(135deg, #f4efff 0%, #eef8f7 48%, #fff7f1 100%);
        color: #251c44;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .prototype-shell {
        width: min(1100px, 100%);
      }

      .prototype-note {
        margin-bottom: 14px;
        color: #6c6288;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .post-card {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) 330px;
        overflow: hidden;
        border: 1px solid rgba(126, 96, 221, 0.22);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow:
          0 28px 80px rgba(46, 31, 100, 0.13),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(18px);
      }

      .post-main {
        padding: 28px;
      }

      .post-header {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr) auto;
        align-items: center;
        gap: 16px;
      }

      .avatar {
        width: 64px;
        height: 64px;
        overflow: hidden;
        border: 3px solid #d9c8ff;
        border-radius: 18px;
        background: #f3edff;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .author-line {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .author-line h1 {
        overflow: hidden;
        color: #1e1640;
        font-size: 20px;
        line-height: 1.1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .verified {
        width: 19px;
        height: 19px;
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #16988f;
        color: #fff;
        font-size: 13px;
        font-weight: 900;
      }

      .post-time {
        margin-top: 4px;
        color: #7d73a0;
        font-size: 14px;
      }

      .more-button {
        width: 64px;
        height: 48px;
        border: 1px solid rgba(45, 35, 78, 0.22);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.78);
        color: #1d1730;
        font-size: 28px;
        font-weight: 900;
        cursor: pointer;
      }

      .post-text {
        margin: 22px 0 18px;
        color: #302650;
        font-size: 18px;
        line-height: 1.55;
      }

      .media-frame {
        position: relative;
        min-height: 315px;
        overflow: hidden;
        border: 1px solid rgba(126, 96, 221, 0.2);
        border-radius: 22px;
        background: #f4f1fb;
      }

      .media-frame img {
        width: 100%;
        height: 100%;
        min-height: 315px;
        display: block;
        object-fit: cover;
      }

      .media-frame::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 48%, rgba(20, 16, 42, 0.26));
        pointer-events: none;
      }

      .media-chip {
        position: absolute;
        top: 14px;
        right: 14px;
        z-index: 1;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(28, 23, 43, 0.76);
        color: #fff;
        font-weight: 900;
      }

      .media-caption {
        position: absolute;
        left: 18px;
        bottom: 16px;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: #251c44;
        font-size: 14px;
        font-weight: 800;
        box-shadow: 0 12px 28px rgba(20, 16, 42, 0.18);
      }

      .caption-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ff684f;
        box-shadow: 0 0 0 5px rgba(255, 104, 79, 0.16);
      }

      .comment-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        margin-top: 18px;
        padding: 12px;
        border: 1px solid rgba(126, 96, 221, 0.16);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.72);
      }

      .comment-row input {
        min-height: 52px;
        border: 1px solid rgba(45, 35, 78, 0.16);
        border-radius: 14px;
        outline: 0;
        padding: 0 18px;
        color: #251c44;
        font-size: 17px;
      }

      .comment-row input::placeholder {
        color: #8b7daf;
      }

      .comment-row button,
      .side-action {
        border: 0;
        border-radius: 14px;
        background: linear-gradient(135deg, #251c44, #6c55d8);
        color: #fff;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
      }

      .comment-row button {
        min-width: 94px;
      }

      .post-insights {
        display: grid;
        gap: 16px;
        padding: 28px 20px;
        border-left: 1px solid rgba(126, 96, 221, 0.16);
        background:
          linear-gradient(180deg, rgba(247, 243, 255, 0.9), rgba(243, 252, 250, 0.84)),
          rgba(255, 255, 255, 0.76);
      }

      .section-title {
        color: #8574b7;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .reaction-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .reaction {
        min-height: 86px;
        display: grid;
        place-items: center;
        gap: 4px;
        padding: 8px 4px;
        border: 1px solid rgba(45, 35, 78, 0.2);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.66);
        color: #4c3b7b;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .reaction b {
        font-size: 30px;
        line-height: 1;
      }

      .reaction span {
        font-size: 12px;
        font-weight: 800;
      }

      .reaction strong {
        color: #21173e;
        font-size: 15px;
      }

      .reaction.hot {
        border-color: rgba(255, 104, 79, 0.42);
        background: linear-gradient(180deg, rgba(255, 238, 234, 0.92), rgba(255, 255, 255, 0.72));
      }

      .popularity-card,
      .week-card {
        border: 1px solid rgba(126, 96, 221, 0.18);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .popularity-card {
        padding: 18px;
      }

      .popularity-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 16px;
      }

      .popularity-head h2 {
        color: #3a2a68;
        font-size: 16px;
      }

      .score {
        color: #7662e5;
        font-size: 34px;
        font-weight: 950;
        line-height: 0.9;
        text-align: right;
      }

      .score span {
        display: block;
        margin-top: 6px;
        color: #8b7daf;
        font-size: 12px;
      }

      .meter {
        height: 28px;
        position: relative;
        border-radius: 999px;
        background:
          linear-gradient(90deg, #d8c5ff 0 33%, #a978f4 33% 66%, #25a7a0 66% 100%);
        box-shadow: inset 0 1px 6px rgba(45, 35, 78, 0.18);
      }

      .meter::before,
      .meter::after {
        content: "";
        position: absolute;
        top: 5px;
        width: 2px;
        height: 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
      }

      .meter::before {
        left: 33%;
      }

      .meter::after {
        left: 66%;
      }

      .meter-face {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        position: absolute;
        top: 50%;
        left: 86%;
        border: 3px solid #fff;
        border-radius: 50%;
        background: #251c44;
        font-size: 17px;
        transform: translate(-50%, -50%);
        box-shadow: 0 8px 18px rgba(45, 35, 78, 0.22);
      }

      .meter-labels {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        margin-top: 10px;
        color: #997fe5;
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      }

      .meter-labels span:last-child {
        display: inline-block;
        margin-top: -3px;
        padding: 5px 9px;
        border-radius: 999px;
        background: #25a7a0;
        color: #fff;
      }

      .week-card {
        padding: 14px;
      }

      .week-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .week-head strong {
        color: #3a2a68;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .week-head span {
        color: #16988f;
        font-size: 13px;
        font-weight: 900;
      }

      .bars {
        height: 92px;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        align-items: end;
        gap: 6px;
        padding: 8px;
        border-radius: 14px;
        background: #f6f2ff;
      }

      .bar {
        display: grid;
        align-content: end;
        gap: 4px;
        color: #8068e7;
        font-size: 10px;
        font-weight: 900;
        text-align: center;
      }

      .bar i {
        display: block;
        min-height: 14px;
        border-radius: 7px 7px 2px 2px;
        background: linear-gradient(180deg, #b895ff, #8068e7);
      }

      .bar.today i {
        background: linear-gradient(180deg, #4ecdc4, #16988f);
      }

      .side-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .side-action {
        min-height: 74px;
        display: grid;
        place-items: center;
        gap: 4px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(45, 35, 78, 0.2);
        color: #18122e;
      }

      .side-action b {
        font-size: 24px;
      }

      .side-action.primary {
        border-color: transparent;
        background: linear-gradient(135deg, #fff, #eaf8f6);
        box-shadow: inset 0 0 0 1px rgba(37, 167, 160, 0.22);
      }

      @media (max-width: 900px) {
        body {
          padding: 16px;
        }

        .post-card {
          grid-template-columns: 1fr;
        }

        .post-insights {
          border-left: 0;
          border-top: 1px solid rgba(126, 96, 221, 0.16);
        }
      }

      @media (max-width: 560px) {
        .post-main,
        .post-insights {
          padding: 18px;
        }

        .post-header {
          grid-template-columns: 54px minmax(0, 1fr) 46px;
        }

        .avatar {
          width: 54px;
          height: 54px;
        }

        .more-button {
          width: 46px;
        }

        .reaction-grid,
        .side-actions {
          grid-template-columns: 1fr 1fr;
        }

        .comment-row {
          grid-template-columns: 1fr;
        }

        .comment-row button {
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main class="prototype-shell">
      <p class="prototype-note">Protótipo visual do card de post</p>

      <article class="post-card">
        <section class="post-main">
          <header class="post-header">
            <div class="avatar">
              <img
                src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=220&q=80"
                alt="Ana e Luna"
              />
            </div>

            <div>
              <div class="author-line">
                <h1>Ana e Luna</h1>
                <span class="verified">✓</span>
              </div>
              <p class="post-time">há 2h · público</p>
            </div>

            <button class="more-button" type="button" aria-label="Mais opções">...</button>
          </header>

          <p class="post-text">
            Passeio no parque e muita diversão! A vida é melhor com nossos melhores amigos!
          </p>

          <figure class="media-frame">
            <img
              src="https://images.unsplash.com/photo-1601758125946-6ec2ef64daf8?auto=format&fit=crop&w=1200&q=85"
              alt="Cachorro brincando no parque"
            />
            <span class="media-chip">1/5</span>
            <figcaption class="media-caption">
              <span class="caption-dot"></span>
              momento em destaque no parque
            </figcaption>
          </figure>

          <form class="comment-row">
            <input type="text" placeholder="Escreva um comentário..." />
            <button type="button">Enviar</button>
          </form>
        </section>

        <aside class="post-insights" aria-label="Reações e estatísticas do post">
          <p class="section-title">Reagir ao post</p>

          <div class="reaction-grid">
            <button class="reaction hot" type="button">
              <b>❤</b>
              <span>Amei</span>
              <strong>48</strong>
            </button>
            <button class="reaction" type="button">
              <b>👏</b>
              <span>Top</span>
              <strong>31</strong>
            </button>
            <button class="reaction" type="button">
              <b>🙂</b>
              <span>Meh</span>
              <strong>3</strong>
            </button>
            <button class="reaction" type="button">
              <b>😿</b>
              <span>Ruim</span>
              <strong>1</strong>
            </button>
          </div>

          <section class="popularity-card">
            <div class="popularity-head">
              <h2>Popularidade</h2>
              <div class="score">86<span>/100</span></div>
            </div>
            <div class="meter">
              <span class="meter-face">😍</span>
            </div>
            <div class="meter-labels">
              <span>Tímido</span>
              <span>Bombando</span>
              <span>Arrasou!</span>
            </div>
          </section>

          <section class="week-card">
            <div class="week-head">
              <strong>Engajamento semanal</strong>
              <span>+24%</span>
            </div>
            <div class="bars" aria-hidden="true">
              <span class="bar"><span>35</span><i style="height: 30%"></i><span>Seg</span></span>
              <span class="bar"><span>48</span><i style="height: 44%"></i><span>Ter</span></span>
              <span class="bar"><span>42</span><i style="height: 37%"></i><span>Qua</span></span>
              <span class="bar"><span>61</span><i style="height: 58%"></i><span>Qui</span></span>
              <span class="bar"><span>55</span><i style="height: 50%"></i><span>Sex</span></span>
              <span class="bar"><span>69</span><i style="height: 68%"></i><span>Sáb</span></span>
              <span class="bar today"><span>86</span><i style="height: 82%"></i><span>Hoje</span></span>
            </div>
          </section>

          <div class="side-actions">
            <button class="side-action primary" type="button">
              <b>🔗</b>
              Compartilhar
            </button>
            <button class="side-action" type="button">
              <b>🏷</b>
              Favoritar
            </button>
          </div>
        </aside>
      </article>
    </main>
  </body>
</html>
